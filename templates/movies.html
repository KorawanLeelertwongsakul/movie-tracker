<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <title>Movie List</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>


<body class="container mt-5">


    <h1>🎬 Movie List</h1>


    <!-- Buttons -->

    <a href="/add" class="btn btn-primary mb-3">

        ➕ Add Movie

    </a>


    <a href="/" class="btn btn-secondary mb-3">

        🏠 Home

    </a>



    <!-- Search -->

    <form method="GET" action="/movies" class="mb-3">

        <input type="text"
               name="search"
               placeholder="Search movie..."
               class="form-control">

    </form>



    <!-- Table -->

    <table class="table table-bordered table-striped">



        <thead class="table-dark">

            <tr>

                <th>Image</th>

                <th>Title</th>

                <th>Genre</th>

                <th>Rating</th>

                <th>Edit</th>

                <th>Delete</th>

                <th>Detail</th>

            </tr>

        </thead>



        <tbody>



            {% for movie in movies %}

            <tr>


                <!-- Image -->

                <td>

                    {% if movie.image %}

                    <img src="/static/uploads/{{ movie.image }}"
                         width="80"
                         class="rounded">

                    {% else %}

                    No Image

                    {% endif %}

                </td>



                <!-- Title -->

                <td>

                    {{ movie.title }}

                </td>



                <!-- Genre -->

                <td>

                    {{ movie.genre }}

                </td>



                <!-- Rating -->

                <td>

                    ⭐ {{ movie.rating }}/10

                </td>




                <!-- Edit -->

                <td>

                    <a href="/edit/{{ movie.id }}"
                       class="btn btn-warning btn-sm">

                        Edit

                    </a>

                </td>




                <!-- Delete -->

                <td>

                    <a href="/delete/{{ movie.id }}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Are you sure?')">

                        Delete

                    </a>

                </td>




                <!-- Detail -->

                <td>

                    <a href="/movie/{{ movie.id }}"
                       class="btn btn-info btn-sm">

                        Detail

                    </a>

                </td>


            </tr>

            {% endfor %}



        </tbody>



    </table>



</body>
</html>
