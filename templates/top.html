<!DOCTYPE html>
<html>
<head>

<title>Top Movies</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="container mt-4">

<h1>🏆 Top Movies</h1>

<a href="/" class="btn btn-secondary mb-3">Back Home</a>

<table class="table table-bordered">

<tr>
<th>Title</th>
<th>Genre</th>
<th>Rating</th>
</tr>

{% for movie in movies %}

<tr>


<td>{{ movie.title }}</td>

<td>{{ movie.genre }}</td>

<td>{{ movie.rating }}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
