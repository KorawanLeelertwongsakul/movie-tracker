<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <title>Add Movie</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>


<body class="container mt-5">


<h1>➕ Add Movie</h1>

<!-- ✅ ปุ่มย้อนกลับ -->
<a href="/movies" class="btn btn-secondary mb-3">
⬅ Back
</a>


<form method="POST" enctype="multipart/form-data">


    <label class="form-label">Title</label>

    <input type="text"
           name="title"
           class="form-control"
           required>



    <label class="form-label mt-3">Genre</label>

    <input type="text"
           name="genre"
           class="form-control"
           required>



    <label class="form-label mt-3">Rating</label>

    <input type="number"
           name="rating"
           class="form-control"
           step="0.1"
           required>



    <!-- upload image -->

    <label class="form-label mt-3">Movie Image</label>

    <input type="file"
           name="image"
           class="form-control">



    <button class="btn btn-success mt-3">

        Save Movie

    </button>


</form>


</body>
</html>
